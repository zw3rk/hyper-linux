# Update Homebrew tap formula on new release
#
# When a new GitHub Release is published, this workflow updates the
# formula in zw3rk/homebrew-hyper-linux with the new version URL
# and SHA256.
#
# Requires a PAT stored as HOMEBREW_TAP_TOKEN with `repo` scope
# for pushing to the tap repository.
#
# Copyright 2025 Moritz Angermann <moritz@zw3rk.com>, zw3rk pte. ltd.
# SPDX-License-Identifier: Apache-2.0

name: Update Homebrew

on:
  release:
    types: [released]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: hl
          homebrew-tap: zw3rk/homebrew-hyper-linux
          download-url: "https://github.com/zw3rk/hyper-linux/releases/download/${{ github.event.release.tag_name }}/hl-${{ github.event.release.tag_name }}.zip"
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
