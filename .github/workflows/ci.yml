# CI — build, test, and release hl
#
# Pipeline:
#   guest-bins (ubuntu) ──┐
#                          ├──▸ test (macOS, self-hosted)
#   build (macOS)        ──┘
#   build ──▸ dist ──▸ release
#
# guest-bins builds cross-compiled aarch64-linux-musl guest binaries on
# a GitHub-hosted Linux runner (~$0.02/run with warm cache), then uploads
# them as an artifact.  All macOS jobs run on self-hosted Apple Silicon
# runners (tart-run) to avoid the 10x macOS billing multiplier.
# Self-hosted runners don't hit the HVF resource exhaustion issue that
# plagued shared CI runners, so integration tests are enabled.

name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

# Nix configuration for all jobs.  Tart VMs may have nix pre-installed
# without flakes/nix-command enabled, so NIX_CONFIG ensures they work.
env:
  NIX_CONFIG: |
    extra-experimental-features = nix-command flakes

jobs:
  # ── Build hl (macOS, self-hosted) ──────────────────────────────
  build:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      # Validate the nix package builds correctly
      - name: Build hl (nix package)
        run: nix build

      # Also validate the Makefile build path (used by dist + test)
      - name: Build hl (make)
        run: nix develop .#ci -c make hl

  # ── Guest binaries (Linux, GitHub-hosted) ──────────────────────
  # Cross-compile aarch64-linux-musl test binaries on x86_64-linux.
  # Linux runners are $0.006/min (1x multiplier) — ~$0.02/run cached.
  guest-bins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build guest-bundle
        run: nix build .#packages.x86_64-linux.guest-bundle

      - name: Package guest binaries
        run: tar -czf guest-bins.tar.gz -C result .

      - name: Upload guest-bins artifact
        uses: actions/upload-artifact@v4
        with:
          name: guest-bins
          path: guest-bins.tar.gz

  # ── Test suite (macOS + guest binaries) ─────────────────────────
  # Downloads guest-bins from the Linux job, builds hl on macOS,
  # then runs unit tests + integration tests.  Requires bare-metal
  # HVF access (nested virt in tart VMs doesn't work on M1).
  test:
    needs: [build, guest-bins]
    runs-on: [self-hosted, macOS, ARM64, hvf]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Download guest-bins artifact
        uses: actions/download-artifact@v4
        with:
          name: guest-bins

      - name: Extract guest binaries
        run: |
          mkdir -p guest-bins
          tar -xzf guest-bins.tar.gz -C guest-bins
          chmod -R +x guest-bins/*/bin/*

      - name: Build hl
        run: nix develop .#ci -c make hl

      - name: Run unit tests (test-all)
        env:
          GUEST_TEST_BINARIES: ${{ github.workspace }}/guest-bins/test-binaries
        run: nix develop .#ci -c make test-all

      - name: Run coreutils integration tests
        env:
          COREUTILS_BIN: ${{ github.workspace }}/guest-bins/coreutils/bin
        run: nix develop .#ci -c make test-coreutils

      - name: Run busybox integration tests
        env:
          BUSYBOX_BIN: ${{ github.workspace }}/guest-bins/busybox/bin/busybox
        run: nix develop .#ci -c make test-busybox

      - name: Run static binary integration tests
        env:
          STATIC_BINS_DIR: ${{ github.workspace }}/guest-bins/static-bins/bin
        run: nix develop .#ci -c make test-static-bins

      - name: Run dynamic linking tests
        env:
          SYSROOT_DIR: ${{ github.workspace }}/guest-bins/sysroot
          GUEST_SYSROOT: ${{ github.workspace }}/guest-bins/sysroot
          GUEST_DYNAMIC_TESTS: ${{ github.workspace }}/guest-bins/dynamic-tests
          GUEST_DYNAMIC_COREUTILS: ${{ github.workspace }}/guest-bins/dynamic-coreutils
          DYNAMIC_COREUTILS_BIN: ${{ github.workspace }}/guest-bins/dynamic-coreutils/bin
        run: |
          nix develop .#ci -c make test-dynamic
          nix develop .#ci -c make test-dynamic-coreutils

      - name: Run Haskell integration tests
        env:
          HASKELL_HELLO: ${{ github.workspace }}/guest-bins/haskell-hello/bin/hello-hyper
          SYSROOT_DIR: ${{ github.workspace }}/guest-bins/sysroot
        run: nix develop .#ci -c make test-haskell

  # ── Distribution artifacts (master + tags) ──────────────────────
  dist:
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Build distribution
        run: nix develop .#ci -c sh -c 'make hl && make dist && make pkg'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hl-dist
          path: |
            dist/out/*.zip
            dist/out/*.pkg

  # ── GitHub Release (tags only) ──────────────────────────────────
  release:
    needs: [dist, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Build distribution
        run: nix develop .#ci -c sh -c 'make hl && make dist && make pkg'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/out/*.zip
            dist/out/*.pkg
          generate_release_notes: true
